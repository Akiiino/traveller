<li class="list-group-item d-flex align-items-center guide-item"
    id="guide-{{ guide.id }}">
    <input type="hidden" name="guide_id" value="{{ guide.id }}">
    <span class="drag-handle me-3 d-none">☰</span>
    <a href="{{ url_for('views.guide', guide_id=guide.id) }}"
       class="flex-grow-1">{{ guide.name }}</a>
    <div class="guide-edit-actions d-none">
        <button class="btn btn-sm btn-outline-secondary"
                hx-get="{{ url_for('views.guide_edit_name', guide_id=guide.id) }}"
                hx-target="#guide-{{ guide.id }}"
                hx-swap="outerHTML">Rename</button>
        <form action="{{ url_for('views.delete_guide', guide_id=guide.id) }}"
              method="post"
              onsubmit='return confirm("Delete guide " + {{ guide.name | tojson }} + " and all its points?");'
              class="d-inline m-0">
            <button class="btn btn-sm btn-outline-danger" type="submit">Delete</button>
        </form>
    </div>
</li>
