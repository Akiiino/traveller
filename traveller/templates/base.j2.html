<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>{{ guide.name }}</title>
        <link rel="stylesheet"
              href="{{ url_for('vendor.static', filename='bootstrap/bootstrap.min.css') }}" />
        <link rel="stylesheet"
              href="{{ url_for('vendor.static', filename='leaflet/leaflet.css') }}" />
        <link rel="stylesheet"
              href="{{ url_for('static', filename='css/styles.css') }}" />
    </head>
    <body data-guide-id="{{ guide.id }}">
        {% set guide_id = guide.id %}
        <div class="container">
            <p class="mb-2">
                <a href="{{ url_for('views.index') }}">← All guides</a>
            </p>
            <h1 class="mb-4">{{ guide.name }}</h1>
            <div class="view-tabs">
                <div class="view-tab active" data-target="map-container">Map View</div>
                <div class="view-tab" data-target="table-container">List View</div>
            </div>
            <div class="map-table-container">
                <div id="map-container">
                    <div class="map-controls">
                        <button class="fullscreen-btn" id="fullscreen-toggle">⛶</button>
                    </div>
                    <div id="map"></div>
                    <div class="mb-3">
                        <button id="fit-bounds" class="btn btn-sm btn-secondary">Show All Markers</button>
                        <div class="form-check form-check-inline">
                            <input class="form-check-input" type="checkbox" id="show-visited" checked />
                            <label class="form-check-label" for="show-visited">Show Visited</label>
                        </div>
                    </div>
                </div>
                <div id="table-container">{% include "table.j2.html" %}</div>
            </div>
            <div class="mt-4">
                <form action="{{ url_for('api.export_gpx', guide_id=guide_id) }}">
                    <input class="btn btn-primary" type="submit" value="Export GPX File" />
                </form>
            </div>
        </div>
        <script src="{{ url_for('vendor.static', filename='leaflet/leaflet.js') }}"></script>
        <script src="{{ url_for('vendor.static', filename='htmx/htmx.min.js') }}"></script>
        <script src="{{ url_for('static', filename='js/main.js') }}"></script>
    </body>
</html>
