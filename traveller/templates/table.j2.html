<div id="card-list"
     class="poi-cards"
     hx-target="closest .poi-card"
     hx-swap="outerHTML">
    {% for point in points %}
        {% include "card.j2.html" %}
    {% endfor %}
</div>
<button class="btn btn-primary add-poi-btn"
        hx-post="{{ url_for('views.new_point', guide_id=guide_id) }}"
        hx-target="#card-list"
        hx-swap="beforeend">Add Point</button>
