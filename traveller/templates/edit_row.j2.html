<tr id="row-poi-{{ point.uuid }}"
    class="editing {% if conflict %}conflict{% endif %}"
    hx-trigger="cancel"
    hx-get="{{ url_for('views.point', guide_id=guide_id, uuid=point.uuid) }}">
    <td></td>
    <td>
        <input name="name" class="full-width" value="{{ point.name or '' }}">
    </td>
    <td>
        <textarea name="description"
                  class="full-width"
                  oninput='this.style.height = "";this.style.height = this.scrollHeight + "px"'>{{ point.description or '' }}</textarea>
    </td>
    <td>
        <select name="category">
            {% for category in categories %}
                <option value="{{ category.name }}"
                        {{ 'selected' if point.category == category.name else '' }}>{{ category.name }}
                </option>
            {% endfor %}
        </select>
    </td>
    <td>
        <input name="link" class="full-width" value="{{ point.link or '' }}">
    </td>
    <td>
        <input type="datetime-local"
               name="timestamp"
               class="{% if 'timestamp' in errors %}field-error{% endif %}"
               value="{% if 'timestamp' in raw %}{{ raw.timestamp }}{% elif point.timestamp is not none %}{{ point.timestamp.strftime("%Y-%m-%dT%H:%M") }}{% endif %}" />
        {% if 'timestamp' in errors %}<div class="field-error-msg">Use YYYY-MM-DDTHH:MM</div>{% endif %}
    </td>
    <td>
        <input name="coordinates"
               class="full-width {% if 'coordinates' in errors %}field-error{% endif %}"
               value="{% if 'coordinates' in raw %}{{ raw.coordinates }}{% elif point.has_coords %}{{ point.latitude }}, {{ point.longitude }}{% endif %}"
               pattern="-?\d+(\.\d+)?,\s*-?\d+(\.\d+)?"
               title="Enter coordinates as latitude, longitude (e.g., 37.5665, 126.9780)">
        {% if 'coordinates' in errors %}<div class="field-error-msg">Use "lat, lon" (e.g. 37.5665, 126.9780)</div>{% endif %}
    </td>
    <td>
        <input type="hidden"
               name="modified_at"
               value="{{ point.modified_at.isoformat() if point.modified_at else '' }}">
        {% if conflict %}
            <div class="conflict-banner"
                 title="Your unsaved changes are still in the form. Save again to overwrite the other version, or copy your text first.">
                Saved by someone else — review and save again to overwrite
            </div>
        {% endif %}
        <div class="poi-actions-compact">
            <button class="btn-icon btn-danger"
                    hx-get="{{ url_for('views.point', guide_id=guide_id, uuid=point.uuid) }}"
                    title="Cancel">❌</button>
            <button class="btn-icon btn-primary"
                    hx-put="{{ url_for('views.point', guide_id=guide_id, uuid=point.uuid) }}"
                    hx-include="closest tr"
                    title="Save">✔️</button>
        </div>
    </td>
</tr>
