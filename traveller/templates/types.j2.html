<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Edit POI Types</title>
        <link rel="stylesheet"
              href="{{ url_for('vendor.static', filename='bootstrap/bootstrap.min.css') }}" />
        <link rel="stylesheet"
              href="{{ url_for('static', filename='css/styles.css') }}" />
    </head>
    <body>
        <div class="container">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h1 class="mb-0">POI Types</h1>
                <a href="{{ url_for('views.index') }}"
                   class="btn btn-sm btn-outline-secondary">← Back to guides</a>
            </div>
            <p class="text-muted">
                Types are shared across all guides. Renaming a type updates
                every point that uses it; a type can only be deleted when no
                point uses it.
            </p>
            <div id="type-list">{% include "type_list.j2.html" %}</div>
            <form class="type-add d-flex align-items-center gap-2 mt-4"
                  hx-post="{{ url_for('views.add_type') }}"
                  hx-include="closest .type-add"
                  hx-target="#type-list"
                  hx-swap="innerHTML"
                  hx-on::after-request="if (event.detail.successful) this.reset()">
                <input type="text"
                       name="name"
                       class="form-control form-control-sm type-name"
                       placeholder="New type name"
                       required />
                <input type="color"
                       name="color"
                       class="form-control form-control-color form-control-sm"
                       value="#1010a0"
                       title="Color" />
                <input type="text"
                       name="icon"
                       class="form-control form-control-sm type-icon"
                       placeholder="icon" />
                <button class="btn btn-sm btn-success" type="submit">Add type</button>
            </form>
        </div>
        <script src="{{ url_for('vendor.static', filename='htmx/htmx.min.js') }}"></script>
    </body>
</html>
