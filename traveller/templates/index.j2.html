<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Travel Guides</title>
        <link rel="stylesheet"
              href="{{ url_for('vendor.static', filename='bootstrap/bootstrap.min.css') }}" />
        <link rel="stylesheet"
              href="{{ url_for('static', filename='css/styles.css') }}" />
    </head>
    <body>
        <div class="container">
            <h1 class="mb-4">Travel Guides</h1>
            {% if guides %}
                <ul class="list-group mb-4">
                    {% for g in guides %}
                        <li class="list-group-item d-flex justify-content-between align-items-center">
                            <a href="{{ url_for('views.guide', guide_id=g.id) }}">{{ g.name }}</a>
                            <form action="{{ url_for('views.delete_guide', guide_id=g.id) }}"
                                  method="post"
                                  onsubmit='return confirm("Delete guide \"{{ g.name }}\" and all its points?");'
                                  class="m-0">
                                <button class="btn btn-sm btn-outline-danger" type="submit">Delete</button>
                            </form>
                        </li>
                    {% endfor %}
                </ul>
            {% else %}
                <p class="text-muted">No guides yet. Create one below.</p>
            {% endif %}
            <form action="{{ url_for('views.create_guide') }}"
                  method="post"
                  class="d-flex gap-2">
                <input name="name"
                       class="form-control"
                       placeholder="New guide name"
                       required />
                <button class="btn btn-primary" type="submit">Create</button>
            </form>
        </div>
    </body>
</html>
