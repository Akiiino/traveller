<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Travel Guides</title>
        <link rel="stylesheet"
              href="{{ url_for('vendor.static', filename='bootstrap/bootstrap.min.css') }}" />
        <link rel="stylesheet"
              href="{{ url_for('static', filename='css/styles.css') }}" />
    </head>
    <body>
        <div class="container">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h1 class="mb-0">Travel Guides</h1>
                {% if guides %}<button class="btn btn-sm btn-outline-secondary" id="toggle-edit-mode">Edit</button>{% endif %}
            </div>
            {% if guides %}
                <ul class="list-group mb-4"
                    id="guide-list"
                    hx-post="{{ url_for('views.reorder_guides') }}"
                    hx-trigger="end"
                    hx-swap="none"
                    hx-include="#guide-list">
                    {% for g in guides %}
                        {% with guide=g %}
                            {% include "guide_row.j2.html" %}
                        {% endwith %}
                    {% endfor %}
                </ul>
            {% else %}
                <p class="text-muted">No guides yet. Create one below.</p>
            {% endif %}
            <form action="{{ url_for('views.create_guide') }}"
                  method="post"
                  class="d-flex gap-2">
                <input name="name"
                       class="form-control"
                       placeholder="New guide name"
                       required />
                <button class="btn btn-primary" type="submit">Create</button>
            </form>
        </div>
        <script src="{{ url_for('vendor.static', filename='htmx/htmx.min.js') }}"></script>
        <script src="{{ url_for('vendor.static', filename='sortable/Sortable.min.js') }}"></script>
        <script src="{{ url_for('static', filename='js/index.js') }}"></script>
    </body>
</html>
